# Example reproducible config for C++ TD sweep.
env=E4
n_steps=1000000
n_runs=32
outdir=td_cxx_logs

# Schedules and projections
base_values=1e-3,1e-2,1e-1,1
schedules=theory,inv_t,inv_sqrt_t,inv_omega_t,constant
projections=none,oracle,upper

# Environment knobs
set.eps1=1e-3
set.eps2=1e-2
set.reward_mode=signed
set.rho=1.0

# Runtime/checkpoint knobs
t0=0
dense_prefix=100
log_step_decades=0.01
threads=0
skip_plots=true
plot_python=false
